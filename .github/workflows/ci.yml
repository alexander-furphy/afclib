name: Library CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Add MSVC ASan to PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          $msvc = vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $asan_path = Get-ChildItem -Path "$msvc\VC\Tools\MSVC" -Recurse -Filter "clang_rt.asan_dynamic-x86_64.dll" | Select-Object -First 1 -ExpandProperty DirectoryName
          echo "$asan_path" >> $env:GITHUB_PATH

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build Library and Tests
        run: cmake --build build

      - name: Sign Binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use the same entitlements you use locally
          for bin in ./build/*_tests; do
            codesign -s - --entitlements entitlements.plist --force "$bin"
          done

      - name: Run Tests
        shell: bash
        timeout-minutes: 5
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Disable leak detection to avoid 'not supported' error on macOS
            export ASAN_OPTIONS="detect_leaks=0"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            # MSVC ASan doesn't use LSan-style leak detection by default
            export ASAN_OPTIONS="detect_leaks=0"
          else
            # Full leak detection on Linux
            export ASAN_OPTIONS="detect_leaks=1:exitcode=1"
          fi
          ctest --test-dir build --output-on-failure -C Debug
