name: Library CI

# Run CI on pushes and pull requests to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # <--- ADD THIS LINE
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v3

      # 2. On Windows, locate the ASan DLL and add it to the PATH
      - name: Add MSVC ASan to PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          $msvc = vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $asan_path = Get-ChildItem -Path "$msvc\VC\Tools\MSVC" -Recurse -Filter "clang_rt.asan_dynamic-x86_64.dll" | Select-Object -First 1 -ExpandProperty DirectoryName
          echo "$asan_path" >> $env:GITHUB_PATH

      - name: Configure CMake
        # -B build creates the build directory
        # -DCMAKE_BUILD_TYPE=Debug ensures your ASan/Leak logic is active
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build Library and Tests
        # --build build runs the correct compiler for the OS (gcc, clang, or msvc)
        run: cmake --build build

      - name: Run Tests
        # --test-dir build tells ctest where to find the test executables
        # --output-on-failure shows your printf/logs if a test fails
        run: ctest --test-dir build --output-on-failure -C Debug